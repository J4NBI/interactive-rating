<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>HTML + CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 h-screen flex items-center justify-center">
    <div class="container bg-gray-800 max-w-[450px] rounded-xl">
      <div class="card mx-auto p-8 flex flex-col gap-4 rounded-xl h-[400px]">
        <div>
          <img
            class="bg-gray-600 p-4 rounded-full w-[55px]"
            src="./images/icon-star.svg"
            alt="Star icon"
          />
        </div>
        <div>
          <h2 class="text-2xl font-semibold text-white/90 mb-2">
            How did we do?
          </h2>
          <p class="text-white/60 leading-relaxed">
            Please lket us know how we di with your support request. All
            feedback is appreciated to help us improve our offering.
          </p>
        </div>

        <form action="/">
          <div class="flex flex-row-reverse justify-between mb-2">
            <!-- 5 -->
            <input
              value="5"
              type="radio"
              name="rating"
              id="r5"
              class="hidden peer"
            />
            <label
              for="r5"
              class="cursor-pointer text-white/60 bg-gray-600 px-6 py-4 rounded-full hover:bg-orange-500 transition-all duration-300 peer-checked:bg-orange-500 peer-checked:text-white"
            >
              5
            </label>

            <!-- 4 -->
            <input
              value="4"
              type="radio"
              name="rating"
              id="r4"
              class="hidden peer"
            />
            <label
              for="r4"
              class="cursor-pointer text-white/60 bg-gray-600 px-6 py-4 rounded-full hover:bg-orange-500 transition-all duration-300 peer-checked:bg-orange-500 peer-checked:text-white peer-checked:~label:bg-orange-500 peer-checked:~label:text-white"
            >
              4
            </label>

            <!-- 3 -->
            <input
              value="3"
              type="radio"
              name="rating"
              id="r3"
              class="hidden peer"
            />
            <label
              for="r3"
              class="cursor-pointer text-white/60 bg-gray-600 px-6 py-4 rounded-full hover:bg-orange-500 transition-all duration-300 peer-checked:bg-orange-500 peer-checked:text-white peer-checked:~label:bg-orange-500 peer-checked:~label:text-white"
            >
              3
            </label>

            <!-- 2 -->
            <input
              value="2"
              type="radio"
              name="rating"
              id="r2"
              class="hidden peer"
            />
            <label
              for="r2"
              class="cursor-pointer text-white/60 bg-gray-600 px-6 py-4 rounded-full hover:bg-orange-500 transition-all duration-300 peer-checked:bg-orange-500 peer-checked:text-white peer-checked:~label:bg-orange-500 peer-checked:~label:text-white"
            >
              2
            </label>

            <!-- 1 -->
            <input
              value="1"
              type="radio"
              name="rating"
              id="r1"
              class="hidden peer"
            />
            <label
              for="r1"
              class="cursor-pointer text-white/60 bg-gray-600 px-6 py-4 rounded-full hover:bg-orange-500 transition-all duration-300 peer-checked:bg-orange-500 peer-checked:text-white peer-checked:~label:bg-orange-500 peer-checked:~label:text-white"
            >
              1
            </label>
          </div>
          <button
            type="submit"
            class="btn mt-8 bg-orange-500 rounded-[100px] py-2 font-bold text-sm tracking-[0.3rem] hover:bg-white/80 duration-300 transition-all w-full"
          >
            SUBMIT
          </button>
        </form>
      </div>
      <div
        class="hidden card-submitted mx-auto p-8 flex flex-col items-center gap-4 rounded-xl h-[400px]"
      >
        <img
          class="w-32"
          src="./images/illustration-thank-you.svg"
          alt="book whith tankyou text"
        />
        <p
          class="text-orange-500 bg-gray-700 py-2 px-4 rounded-[100px] mt-4 text-sm"
        >
          You selected <span class="rating-count">4</span> out of 5
        </p>
        <h2 class="text-white/90 text-3xl mt-6 font-semibold">Thank you!</h2>
        <p class="text-white/70 text-center">
          We appreciate you taking the time to give a rating.<br />
          If you ever nedd more support, don't hasitate to<br />
          get in touch!
        </p>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
